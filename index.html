<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Face Test</title>
    <meta name="google-adsense-account" content="ca-pub-8469659589717489">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8469659589717489" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="theme-toggle-container">
            <button id="theme-toggle">Dark Mode</button>
        </div>
        
        <section class="animal-test-section">
            <h1>Animal Face Test (Dog vs Cat)</h1>
            <div class="upload-area">
                <input type="file" id="image-upload" accept="image/*" hidden>
                <div class="upload-icon">📁</div>
                <p>Drag & Drop your image here or</p>
                <button id="upload-btn" class="secondary-btn">Upload Image</button>
            </div>
            <div id="image-preview-container">
                <img id="image-preview" src="#" alt="Preview" style="display: none; max-width: 100%; border-radius: 10px; margin-top: 1rem;">
            </div>
            <div id="result-container" style="margin-top: 1rem; font-size: 1.2rem; font-weight: bold;"></div>
            <button id="reset-btn" class="secondary-btn" style="display: none; margin-top: 1rem; background-color: #f39c12;">Try Again</button>
        </section>

        <hr class="separator">

        <div class="inquiry-form">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xpqoywoq" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </div>

        <hr class="separator">

        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://firstproject-1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js"></script>
</body>
</html>

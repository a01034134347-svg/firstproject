<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle-container">
            <button id="theme-toggle">Dark Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers"></div>
        <button id="generator-btn">Generate Numbers</button>

        <hr class="separator">

        <div class="inquiry-form">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xpqoywoq" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>

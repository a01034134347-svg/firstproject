<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Face Test - Select Language / 언어 선택</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .selection-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background: linear-gradient(135deg, #6C5CE7, #a29bfe);
            color: white;
            padding: 20px;
        }
        .options {
            display: flex;
            gap: 2rem;
            margin-top: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .option-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            color: #2d3436;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 220px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .option-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .flag {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }
        .option-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .option-card p {
            font-size: 0.9rem;
            color: #636e72;
        }
        .logo-main {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="selection-container">
        <div class="logo-main">🐾 Animal Face Test</div>
        <p class="subtitle">Discover your animal type / 당신의 동물상을 찾아보세요</p>
        
        <div class="options">
            <a href="en.html" class="option-card" onclick="setLanguage('en')">
                <span class="flag">🇺🇸</span>
                <h2>English</h2>
                <p>Proceed to Test</p>
            </a>
            <a href="ko.html" class="option-card" onclick="setLanguage('ko')">
                <span class="flag">🇰🇷</span>
                <h2>한국어</h2>
                <p>테스트로 이동</p>
            </a>
        </div>
    </div>

    <script>
        function setLanguage(lang) {
            localStorage.setItem('preferredLang', lang);
        }

        // Automatic redirection based on saved preference or browser language
        window.onload = function() {
            const savedLang = localStorage.getItem('preferredLang');
            if (savedLang === 'en') {
                window.location.href = 'en.html';
            } else if (savedLang === 'ko') {
                window.location.href = 'ko.html';
            } else {
                // Optional: Browser language detection for first-time visitors
                const browserLang = navigator.language.substring(0, 2);
                if (browserLang === 'ko') {
                    // window.location.href = 'ko.html'; // If you want automatic redirect for new users
                }
            }
        };
    </script>
</body>
</html>
